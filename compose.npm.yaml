services:
  postgres:
    image: postgres:17
    container_name: clubtreasury-db
    restart: always
    environment:
      POSTGRES_PASSWORD: #Set root password
      POSTGRES_DB: ClubCash
      POSTGRES_USER: dev
    volumes:
      # Change volume path to match your system
      - /volume1/docker/clubtreasury/postgres:/var/lib/postgresql/data
    networks:
      - clubtreasury-backend
    #Use this if you need direct access to docker database container for debugging purposes
    #ports:
      # - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d ClubCash"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 5

  webapp:
    container_name: clubtreasury-web
    image: flatecoding/clubtreasury:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      USERMAP_UID: #Set to your docker user id (e.g. 1029)
      USERMAP_GID: #Set to your docker group id (e.g. 100)
      UI_APPNAME: ClubTreasury
      UI_HOMEDESCRIPTION: Administrationtool for club treasures
      UI_APPNAMENAVBAR: ClubTreasury
      Logging__LogLevel__Default: "Information"
      Logging__LogLevel__Microsoft.EntityFrameworkCore: "Information"
      ASPNETCORE_ENVIRONMENT: "Production"
      DbPassword: #Secret POSTGRES_PASSWORD
      ADMIN_USERNAME: admin
      ADMIN_EMAIL: admin@admin.de
      ADMIN_PASSWORD: #another secret pw for first user
    volumes:
      # Change volume paths to match your system
      - /volume1/docker/clubtreasury/exports:/app/exports
      - /volume1/docker/clubtreasury/logs:/app/logs
    networks:
      - clubtreasury-backend
      - proxy
    # No ports exposed - access is handled by the reverse proxy (e.g. Nginx Proxy Manager)
    # Configure your proxy to forward to clubtreasury-web:8080

networks:
  clubtreasury-backend:
    driver: bridge
  proxy:
    external: true