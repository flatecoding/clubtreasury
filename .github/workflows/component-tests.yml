name: Component Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  component-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Run component tests
      run: dotnet test ClubTreasury.ComponentTests --no-build --configuration Release --verbosity normal --logger "trx;LogFileName=component-test-results.trx"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: component-test-results
        path: ClubTreasury.ComponentTests/TestResults/*.trx